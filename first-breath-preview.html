<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attune — First Breath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b8975c;
            --gold-dark: #8b7340;
            --gold-light: #d4b87a;
            --forest-dark: #2d4a3e;
            --forest: #3d6b4f;
            --cream: #faf6ee;
            --calm-color: #5a9a6e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--forest-dark);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Full-screen overlay */
        .first-breath-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(30, 55, 42, 0.97);
            transition: opacity 0.8s ease;
        }
        .first-breath-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Sunrise gradient — expands from bottom */
        .sunrise-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200%;
            height: 0%;
            background: radial-gradient(ellipse at 50% 100%,
                rgba(184, 151, 92, 0.25) 0%,
                rgba(184, 151, 92, 0.08) 40%,
                transparent 70%);
            transition: height 1s ease-out;
            pointer-events: none;
        }

        /* Center content */
        .first-breath-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 440px;
            padding: 0 24px;
        }

        .first-breath-headline {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 32px;
            font-weight: 500;
            color: var(--cream);
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideIn 0.8s 0.3s ease forwards;
        }

        .first-breath-body {
            font-size: 15px;
            color: rgba(250, 246, 238, 0.7);
            line-height: 1.6;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideIn 0.8s 0.6s ease forwards;
        }

        /* Suggested phrase pill */
        .first-breath-pill {
            display: inline-block;
            border: 1px solid rgba(184, 151, 92, 0.4);
            border-radius: 24px;
            padding: 10px 22px;
            margin-bottom: 36px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideIn 0.8s 0.9s ease forwards;
        }
        .first-breath-pill span {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 14px;
            color: var(--gold-light);
        }

        /* Progress ring */
        .ring-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 24px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeScaleIn 0.8s 1.2s ease forwards;
        }

        .ring-track {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 8;
        }
        .ring-fill {
            fill: none;
            stroke: url(#gold-gradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 339.3;
            stroke-dashoffset: 339.3;
            transition: stroke-dashoffset 0.5s ease;
            filter: drop-shadow(0 0 6px rgba(184, 151, 92, 0.4));
        }

        .ring-seconds {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 48px;
            font-weight: 600;
            color: var(--gold);
        }
        .ring-seconds .unit {
            font-size: 14px;
            font-weight: 400;
            color: rgba(184, 151, 92, 0.6);
            display: block;
            margin-top: -4px;
        }

        /* Mic dot */
        .mic-dot-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--calm-color);
            margin: 0 auto 16px;
            animation: breatheDot 3s ease-in-out infinite;
            opacity: 0;
            animation: breatheDot 3s ease-in-out infinite, fadeSlideIn 0.8s 1.4s ease forwards;
        }

        /* Simulated waveform */
        .waveform-wrap {
            width: 260px;
            height: 40px;
            margin: 0 auto 24px;
            opacity: 0;
            animation: fadeSlideIn 0.8s 1.4s ease forwards;
        }
        .waveform-wrap canvas {
            width: 100%;
            height: 100%;
        }

        /* Skip link */
        .skip-link {
            position: fixed;
            bottom: 24px;
            right: 28px;
            font-size: 12px;
            color: rgba(250, 246, 238, 0.4);
            text-decoration: none;
            z-index: 1001;
            transition: color 0.3s;
        }
        .skip-link:hover { color: rgba(250, 246, 238, 0.7); }

        /* Restart button */
        .restart-btn {
            position: fixed;
            bottom: 24px;
            left: 28px;
            font-size: 12px;
            color: rgba(250, 246, 238, 0.4);
            background: none;
            border: 1px solid rgba(250, 246, 238, 0.2);
            border-radius: 16px;
            padding: 6px 16px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .restart-btn:hover {
            color: rgba(250, 246, 238, 0.7);
            border-color: rgba(250, 246, 238, 0.4);
        }

        /* Completion flash */
        .completion-flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 248, 230, 0.5), transparent 70%);
            opacity: 0;
            z-index: 999;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .completion-flash.active {
            opacity: 1;
        }

        /* Dashboard placeholder (revealed after completion) */
        .dashboard-placeholder {
            position: fixed;
            inset: 0;
            background: var(--forest-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }
        .dashboard-placeholder h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 24px;
            color: var(--cream);
            margin-bottom: 8px;
        }
        .dashboard-placeholder p {
            font-size: 14px;
            color: rgba(250, 246, 238, 0.5);
        }

        /* Animations */
        @keyframes fadeSlideIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeScaleIn {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes breatheDot {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Dashboard placeholder (behind overlay) -->
    <div class="dashboard-placeholder">
        <h2>Your voice has been heard</h2>
        <p>Welcome to Attune — your dashboard is ready.</p>
    </div>

    <!-- Completion flash -->
    <div class="completion-flash" id="completion-flash"></div>

    <!-- Main overlay -->
    <div class="first-breath-overlay" id="first-breath-overlay">
        <div class="sunrise-glow" id="sunrise-glow"></div>

        <div class="first-breath-content">
            <h1 class="first-breath-headline">Let Attune hear you</h1>
            <p class="first-breath-body">Speak for 30 seconds to capture your first reading</p>

            <div class="first-breath-pill">
                <span>Say "Good morning, I'm feeling..."</span>
            </div>

            <!-- Progress ring -->
            <div class="ring-wrap">
                <svg viewBox="0 0 120 120" width="180" height="180">
                    <defs>
                        <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#d4b87a"/>
                            <stop offset="100%" stop-color="#b8975c"/>
                        </linearGradient>
                    </defs>
                    <circle cx="60" cy="60" r="54" class="ring-track"/>
                    <circle cx="60" cy="60" r="54" class="ring-fill" id="ring-fill"
                        transform="rotate(-90 60 60)"/>
                </svg>
                <div class="ring-seconds" id="ring-seconds">
                    <span id="seconds-value">0</span>
                    <span class="unit">seconds</span>
                </div>
            </div>

            <!-- Mic dot -->
            <div class="mic-dot-indicator" id="mic-dot-indicator"></div>

            <!-- Simulated waveform -->
            <div class="waveform-wrap">
                <canvas id="waveform-canvas" width="520" height="80"></canvas>
            </div>
        </div>
    </div>

    <!-- Skip link -->
    <a href="#" class="skip-link" id="skip-link" onclick="skipToEnd(); return false;">Skip and explore dashboard</a>

    <!-- Restart button -->
    <button class="restart-btn" id="restart-btn" style="display: none;" onclick="restartAnimation()">Restart</button>

    <script>
        const TOTAL_SECONDS = 30;
        const CIRCUMFERENCE = 2 * Math.PI * 54; // ≈ 339.3

        let currentSecond = 0;
        let timerInterval = null;
        let waveformRAF = null;
        let isRunning = false;

        const ringFill = document.getElementById('ring-fill');
        const secondsValue = document.getElementById('seconds-value');
        const sunriseGlow = document.getElementById('sunrise-glow');
        const overlay = document.getElementById('first-breath-overlay');
        const flash = document.getElementById('completion-flash');
        const skipLink = document.getElementById('skip-link');
        const restartBtn = document.getElementById('restart-btn');
        const canvas = document.getElementById('waveform-canvas');
        const ctx = canvas.getContext('2d');

        function updateRing(seconds) {
            const progress = seconds / TOTAL_SECONDS;
            const offset = CIRCUMFERENCE * (1 - progress);
            ringFill.style.strokeDashoffset = offset;
            secondsValue.textContent = seconds;

            // Sunrise glow grows with progress
            const glowHeight = 20 + progress * 60; // 20% → 80%
            sunriseGlow.style.height = glowHeight + '%';
        }

        // Waveform animation
        const barCount = 40;
        const barWidth = 520 / barCount - 2;
        let barHeights = new Array(barCount).fill(5);

        function drawWaveform() {
            ctx.clearRect(0, 0, 520, 80);

            for (let i = 0; i < barCount; i++) {
                // Simulate speech: random amplitude with smooth interpolation
                if (isRunning) {
                    const target = 8 + Math.random() * 52;
                    barHeights[i] += (target - barHeights[i]) * 0.15;
                } else {
                    barHeights[i] += (5 - barHeights[i]) * 0.1;
                }

                const x = i * (barWidth + 2) + 1;
                const h = barHeights[i];
                const y = (80 - h) / 2;

                // Gold gradient bar
                const alpha = 0.5 + (h / 60) * 0.5;
                ctx.fillStyle = `rgba(184, 151, 92, ${alpha})`;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, h, 3);
                ctx.fill();
            }

            waveformRAF = requestAnimationFrame(drawWaveform);
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            currentSecond = 0;
            updateRing(0);

            timerInterval = setInterval(() => {
                currentSecond++;
                updateRing(currentSecond);

                if (currentSecond >= TOTAL_SECONDS) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    completeAnimation();
                }
            }, 1000);
        }

        function completeAnimation() {
            isRunning = false;

            // Flash
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 600);

            // Fade out overlay
            setTimeout(() => {
                overlay.classList.add('fade-out');
                skipLink.style.display = 'none';
                restartBtn.style.display = '';
            }, 800);
        }

        function skipToEnd() {
            if (timerInterval) clearInterval(timerInterval);
            isRunning = false;
            currentSecond = TOTAL_SECONDS;
            updateRing(TOTAL_SECONDS);
            completeAnimation();
        }

        function restartAnimation() {
            overlay.classList.remove('fade-out');
            skipLink.style.display = '';
            restartBtn.style.display = 'none';
            currentSecond = 0;
            updateRing(0);
            sunriseGlow.style.height = '20%';

            // Re-run entrance animations
            overlay.querySelectorAll('.first-breath-headline, .first-breath-body, .first-breath-pill, .ring-wrap, .mic-dot-indicator, .waveform-wrap').forEach(el => {
                el.style.animation = 'none';
                el.offsetHeight; // reflow
                el.style.animation = '';
            });

            setTimeout(() => startTimer(), 1500);
        }

        // Start
        drawWaveform();
        setTimeout(() => startTimer(), 2000);
    </script>
</body>
</html>

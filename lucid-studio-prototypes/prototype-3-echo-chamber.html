<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOTYPE 3: Emotional Echo Chamber</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f8f9fa;
    color: #1a1d21;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #e4e8ec;
    background: #fff;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .proto-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: #5B8DB8;
    background: rgba(91,141,184,0.1);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(91,141,184,0.25);
    text-transform: uppercase;
  }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1d21;
  }
  .header-sub {
    font-size: 12px;
    color: #5a6270;
    font-weight: 400;
    margin-top: 1px;
  }
  .lucid-wordmark {
    font-size: 13px;
    font-weight: 600;
    color: #5B8DB8;
    letter-spacing: 0.06em;
  }

  /* ── Main Layout ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 32px;
    gap: 20px;
  }

  .framing {
    font-size: 13px;
    color: #5a6270;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .content-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex: 1;
  }

  /* ── Left: Weather Map ── */
  .map-panel {
    flex: 0 0 60%;
    background: #fff;
    border: 1px solid #e4e8ec;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .map-panel-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid #f0f2f4;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .map-panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5a6270;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #5B8DB8;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  #weatherCanvas {
    display: block;
    width: 100%;
  }
  .map-legend {
    display: flex;
    gap: 16px;
    padding: 10px 18px 14px;
    border-top: 1px solid #f0f2f4;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #5a6270;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* ── Right: Echo Cards ── */
  .echo-panel {
    flex: 0 0 calc(40% - 20px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .echo-panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5a6270;
    padding-bottom: 4px;
  }
  .echo-cards-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .echo-card {
    background: #fff;
    border: 1px solid #e4e8ec;
    border-radius: 12px;
    padding: 14px 16px;
    transition: all 0.4s ease;
    opacity: 1;
    transform: translateY(0);
  }
  .echo-card.new-card {
    animation: slideInCard 0.5s ease forwards;
    border-color: rgba(91,141,184,0.4);
    box-shadow: 0 2px 12px rgba(91,141,184,0.12);
  }
  @keyframes slideInCard {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-time { font-size: 10px; color: #9aa3ae; font-weight: 400; }
  .card-insight {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #5B8DB8;
    background: rgba(91,141,184,0.1);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .card-insight.tense {
    color: #b44040;
    background: rgba(180,64,64,0.08);
  }
  .card-state {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 10px;
  }
  .state-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .state-icon.calm  { background: rgba(91,141,184,0.15); }
  .state-icon.steady { background: rgba(91,141,184,0.08); }
  .state-icon.tense { background: rgba(180,64,64,0.12); }
  .state-label {
    font-size: 12px;
    font-weight: 500;
    color: #1a1d21;
  }
  .card-waveform { display: block; }

  /* ── Bottom Bar ── */
  .bottom-bar {
    background: #fff;
    border: 1px solid #e4e8ec;
    border-radius: 14px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .biomarkers {
    display: flex;
    gap: 24px;
    flex: 1;
  }
  .bio-item { display: flex; flex-direction: column; gap: 5px; min-width: 100px; }
  .bio-label { font-size: 10px; font-weight: 500; color: #9aa3ae; text-transform: uppercase; letter-spacing: 0.08em; }
  .bio-bar-track { height: 4px; background: #f0f2f4; border-radius: 4px; overflow: hidden; }
  .bio-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: #5B8DB8;
    transition: width 1.2s ease, background 1.2s ease;
  }
  .bio-value { font-size: 11px; font-weight: 600; color: #1a1d21; }

  .controls { display: flex; gap: 10px; }
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }
  .btn-relax {
    background: #5B8DB8;
    color: #fff;
  }
  .btn-relax:hover { background: #4d7ea6; }
  .btn-stress {
    background: #f0f2f4;
    color: #5a6270;
    border: 1px solid #e4e8ec;
  }
  .btn-stress:hover { background: #e4e8ec; }
  .btn.active-relax { background: #5B8DB8; box-shadow: 0 0 0 3px rgba(91,141,184,0.2); }
  .btn.active-stress { background: #c0392b; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="proto-badge">Prototype 3</div>
    <div>
      <div class="header-title">Emotional Echo Chamber</div>
      <div class="header-sub">Voice journaling → emotional weather map</div>
    </div>
  </div>
  <div class="lucid-wordmark">Lucid</div>
</div>

<div class="main">
  <div class="framing">Speak freely. Watch your emotional landscape emerge.</div>

  <div class="content-row">
    <!-- Left: Weather Map -->
    <div class="map-panel">
      <div class="map-panel-header">
        <span class="map-panel-title">Emotional Weather Map</span>
        <div class="live-dot"></div>
      </div>
      <canvas id="weatherCanvas" width="600" height="350"></canvas>
      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(91,141,184,0.6)"></div>
          Calm zone
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(180,80,70,0.6)"></div>
          Stress zone
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(91,141,184,0.25)"></div>
          Transitional
        </div>
      </div>
    </div>

    <!-- Right: Echo Cards -->
    <div class="echo-panel">
      <div class="echo-panel-title">Recent Echoes</div>
      <div class="echo-cards-list" id="echoCardsList">
        <!-- Cards injected by JS -->
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="biomarkers">
      <div class="bio-item">
        <div class="bio-label">HRV</div>
        <div class="bio-bar-track">
          <div class="bio-bar-fill" id="barHRV" style="width:62%"></div>
        </div>
        <div class="bio-value" id="valHRV">62 ms</div>
      </div>
      <div class="bio-item">
        <div class="bio-label">Voice Coherence</div>
        <div class="bio-bar-track">
          <div class="bio-bar-fill" id="barCoh" style="width:58%"></div>
        </div>
        <div class="bio-value" id="valCoh">58%</div>
      </div>
      <div class="bio-item">
        <div class="bio-label">Tension Index</div>
        <div class="bio-bar-track">
          <div class="bio-bar-fill" id="barTension" style="width:44%;background:#b44040"></div>
        </div>
        <div class="bio-value" id="valTension">44%</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-relax" id="btnRelax" onclick="setMode('relax')">Simulate Relaxing</button>
      <button class="btn btn-stress" id="btnStress" onclick="setMode('stress')">Simulate Stress</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let mode = 'neutral'; // 'relax' | 'stress' | 'neutral'
let t = 0;
let bioHRV = 62, bioCoh = 58, bioTension = 44;
let targetHRV = 62, targetCoh = 58, targetTension = 44;

// ─────────────────────────────────────────────
// Initial Echo Cards
// ─────────────────────────────────────────────
const initialCards = [
  { time: '8m ago', stateKey: 'steady', stateLabel: 'Steady', insight: 'Focus', waveColor: '#5B8DB8' },
  { time: '5m ago', stateKey: 'tense',  stateLabel: 'Tense',  insight: 'Notice', waveColor: '#b44040' },
  { time: '2m ago', stateKey: 'calm',   stateLabel: 'Calm',   insight: 'Ease',   waveColor: '#5B8DB8' },
];

function stateIcon(key) {
  const icons = { calm: '◉', steady: '◎', tense: '◈' };
  return icons[key] || '◎';
}

function buildCard(data, isNew) {
  const card = document.createElement('div');
  card.className = 'echo-card' + (isNew ? ' new-card' : '');

  const insightClass = data.stateKey === 'tense' ? 'card-insight tense' : 'card-insight';

  // Mini waveform SVG
  const wave = generateWaveSVG(data.stateKey, data.waveColor);

  card.innerHTML = `
    <div class="card-top">
      <span class="card-time">${data.time}</span>
      <span class="${insightClass}">${data.insight}</span>
    </div>
    <div class="card-state">
      <div class="state-icon ${data.stateKey}">${stateIcon(data.stateKey)}</div>
      <span class="state-label">${data.stateLabel}</span>
    </div>
    ${wave}
  `;
  return card;
}

function generateWaveSVG(stateKey, color) {
  const w = 180, h = 32;
  let d = `M 0 ${h/2}`;

  if (stateKey === 'calm') {
    // Smooth gentle wave
    for (let x = 0; x <= w; x += 20) {
      const y = h/2 + Math.sin(x * 0.08) * 6;
      const y2 = h/2 + Math.sin((x+10) * 0.08) * 6;
      d += ` C ${x},${y} ${x+10},${y2} ${x+20},${h/2 + Math.sin((x+20)*0.08)*6}`;
    }
  } else if (stateKey === 'tense') {
    // Jagged
    for (let x = 0; x <= w; x += 15) {
      const spike = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 6);
      d += ` L ${x},${h/2 + spike}`;
    }
  } else {
    // Steady medium
    for (let x = 0; x <= w; x += 20) {
      const y = h/2 + Math.sin(x * 0.05) * 4;
      d += ` L ${x},${y}`;
    }
  }

  return `<svg class="card-waveform" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </svg>`;
}

function renderInitialCards() {
  const list = document.getElementById('echoCardsList');
  list.innerHTML = '';
  initialCards.forEach(c => list.appendChild(buildCard(c, false)));
}

function addCard(stateKey) {
  const map = {
    relax: { stateLabel: 'Calm',  insight: 'Ease',   waveColor: '#5B8DB8' },
    stress: { stateLabel: 'Tense', insight: 'Notice', waveColor: '#b44040' },
  };
  const data = { time: 'Just now', stateKey: stateKey === 'relax' ? 'calm' : 'tense', ...map[stateKey] };
  const list = document.getElementById('echoCardsList');
  const card = buildCard(data, true);
  list.insertBefore(card, list.firstChild);
  // Remove oldest if >4
  while (list.children.length > 4) list.removeChild(list.lastChild);
}

renderInitialCards();

// ─────────────────────────────────────────────
// Mode control
// ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnRelax').classList.toggle('active-relax', m === 'relax');
  document.getElementById('btnStress').classList.toggle('active-stress', m === 'stress');

  if (m === 'relax') {
    targetHRV = 78; targetCoh = 82; targetTension = 18;
    addCard('relax');
  } else {
    targetHRV = 38; targetCoh = 28; targetTension = 76;
    addCard('stress');
  }
}

// Auto-cycle
let cycleTimer = 0;
function autoCycle(dt) {
  cycleTimer += dt;
  if (cycleTimer > 12000) {
    cycleTimer = 0;
    setMode(mode === 'relax' ? 'stress' : 'relax');
  }
}

// ─────────────────────────────────────────────
// Biomarker animation
// ─────────────────────────────────────────────
function lerpBio(current, target, speed) {
  return current + (target - current) * speed;
}

function updateBiomarkers(dt) {
  const speed = 0.003 * dt;
  bioHRV = lerpBio(bioHRV, targetHRV, Math.min(speed, 0.05));
  bioCoh = lerpBio(bioCoh, targetCoh, Math.min(speed, 0.05));
  bioTension = lerpBio(bioTension, targetTension, Math.min(speed, 0.05));

  document.getElementById('barHRV').style.width = bioHRV + '%';
  document.getElementById('valHRV').textContent = Math.round(bioHRV) + ' ms';
  document.getElementById('barCoh').style.width = bioCoh + '%';
  document.getElementById('valCoh').textContent = Math.round(bioCoh) + '%';

  const tColor = bioTension > 50 ? '#b44040' : '#5B8DB8';
  document.getElementById('barTension').style.width = bioTension + '%';
  document.getElementById('barTension').style.background = tColor;
  document.getElementById('valTension').textContent = Math.round(bioTension) + '%';
}

// ─────────────────────────────────────────────
// Noise helper
// ─────────────────────────────────────────────
function noise(x, t) {
  return Math.sin(x * 0.01 + t * 0.5) * Math.sin(x * 0.02 + t * 0.3) * 30;
}

// ─────────────────────────────────────────────
// Weather Map Canvas
// ─────────────────────────────────────────────
const canvas = document.getElementById('weatherCanvas');
const ctx = canvas.getContext('2d');

// Blob definitions (center, base radius, color transitions)
const blobs = [
  { cx: 0.3, cy: 0.4, r: 110, phaseOffset: 0,    spiky: 0.7 },
  { cx: 0.65, cy: 0.35, r: 90, phaseOffset: 1.2,  spiky: 0.3 },
  { cx: 0.5, cy: 0.65, r: 100, phaseOffset: 2.4,  spiky: 0.5 },
  { cx: 0.2, cy: 0.7,  r: 70,  phaseOffset: 0.8,  spiky: 0.6 },
  { cx: 0.8, cy: 0.6,  r: 80,  phaseOffset: 1.8,  spiky: 0.2 },
];

let stressLevel = 0.5; // 0=calm, 1=stressed

function drawBlob(blob, sl) {
  const W = canvas.width, H = canvas.height;
  const cx = blob.cx * W;
  const cy = blob.cy * H;
  const baseR = blob.r;

  // Choose fill based on stress
  const calmR = 91, calmG = 141, calmB = 184;
  const stressR = 180, stressG = 80, stressB = 70;
  const r = Math.round(calmR + (stressR - calmR) * sl);
  const g = Math.round(calmG + (stressG - calmG) * sl);
  const b = Math.round(calmB + (stressB - calmB) * sl);
  const alpha = 0.18 + sl * 0.12;

  // Spikiness: stressed = more spikes, calmer = fewer
  const spikeAmp = 18 + sl * 38;
  const freq = 3 + sl * 5; // number of perturbations

  ctx.beginPath();
  const steps = 80;
  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * Math.PI * 2;
    const n = noise(angle * 180, t * 0.6 + blob.phaseOffset);
    const n2 = Math.sin(angle * freq + t * 0.4 + blob.phaseOffset) * spikeAmp;
    const rr = baseR + n + n2 * blob.spiky;
    const x = cx + Math.cos(angle) * rr;
    const y = cy + Math.sin(angle) * rr;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
  ctx.fill();

  // Soft glow border
  ctx.strokeStyle = `rgba(${r},${g},${b},${0.15 + sl * 0.1})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawContourLines(sl) {
  const W = canvas.width, H = canvas.height;
  ctx.save();
  ctx.globalAlpha = 0.06;
  // Draw faint grid lines like a topographic map
  for (let i = 1; i < 5; i++) {
    ctx.beginPath();
    ctx.setLineDash([4, 8]);
    ctx.strokeStyle = '#5B8DB8';
    ctx.lineWidth = 0.8;
    const y = (i / 5) * H;
    ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawWeatherMap() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  const bgA = `rgba(${Math.round(240 - stressLevel * 20)},${Math.round(244 - stressLevel * 20)},${Math.round(248 - stressLevel * 10)},1)`;
  bg.addColorStop(0, '#f8f9fa');
  bg.addColorStop(1, bgA);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawContourLines(stressLevel);

  // Draw blobs back to front
  blobs.forEach(b => drawBlob(b, stressLevel));

  // Label overlay
  ctx.font = '500 10px Inter, sans-serif';
  ctx.fillStyle = `rgba(91,141,184,${0.5 - stressLevel * 0.3})`;
  ctx.fillText('calm', 0.58 * W, 0.28 * H);
  ctx.fillStyle = `rgba(180,80,70,${0.3 + stressLevel * 0.4})`;
  ctx.fillText('active', 0.22 * W, 0.35 * H);
  ctx.fillStyle = `rgba(91,141,184,${0.4 - stressLevel * 0.2})`;
  ctx.fillText('ease', 0.43 * W, 0.72 * H);
}

// ─────────────────────────────────────────────
// Animation Loop
// ─────────────────────────────────────────────
let lastTime = null;

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  t += 0.016;

  // Lerp stress level
  const targetStress = mode === 'stress' ? 1 : (mode === 'relax' ? 0 : 0.5);
  stressLevel += (targetStress - stressLevel) * 0.008;

  drawWeatherMap();
  updateBiomarkers(dt);
  autoCycle(dt);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
